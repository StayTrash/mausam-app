<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mausam Vibhag app</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <button id="themeBtn">
            🌙 Dark Mode
        </button>

        <h1>Weather App</h1>

        <div class="search-box">
            <input
                type="text"
                id="cityInput"
                placeholder="Enter city"
                autocomplete="off"
            >

            <div id="suggestion-items"></div>
        </div>

        <button id="search-btn">
            Search
        </button>

        <button id="locationBtn">
            Use My Location
        </button>

        <div id="result"></div>

        <div id="historyBox">
            <h3>Recent Searches</h3>
            <div id="history"></div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
